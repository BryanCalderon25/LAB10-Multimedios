<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCR | Sistema Informativo Moderno</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <!-- Global Styles -->
    <link rel="stylesheet" href="./styles/global.css">
    <link rel="stylesheet" href="./styles/animations.css">
    
    <!-- Web Components Module -->
    <script type="module" src="./main.js"></script>
    
    <meta name="description" content="Sistema informativo y flyer interactivo de la Universidad de Costa Rica - Sede Guanacaste.">
</head>
<body>
    
    <style>
        /* Example of how to customize using CSS Variables and CSS Parts! */
        ucr-flyer {
            --flyer-bg: #111827; /* Dark premium background */
            --flyer-primary: #8b5cf6; /* Vibrant purple */
            --flyer-secondary: #0ea5e9; /* Vibrant blue */
            --flyer-radius: 32px;
            --flyer-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            --flyer-text-inverse: #ffffff;
        }

        /* Using CSS Parts to bypass encapsulation */
        ucr-flyer::part(wrapper) {
            border: 4px solid rgba(255, 255, 255, 0.1);
        }

        sign-board {
            --sign-bg: linear-gradient(145deg, #1e1e2f, #151522);
            --sign-radius: 20px;
            --sign-accent: #8b5cf6;
        }
    </style>

    <div class="app-container">
        <!-- Modern Flyer Component -->
        <ucr-flyer>
            <!-- Using Slots to override content if needed. Default content is provided internally. -->
        </ucr-flyer>

        <!-- Directional Sign Board Component using Slots -->
        <sign-board>
            <sign-item slot="items">Aulas 5, 6, 7</sign-item>
            <sign-item slot="items">Apoyo Informático</sign-item>
            <sign-item slot="items">Servidores</sign-item>
            <sign-item slot="items">Laboratorio 1 y 2</sign-item>
            <sign-item slot="items">Coordinación CIE</sign-item>
            <span slot="footer">UCR SEDE GUANACASTE</span>
        </sign-board>
    </div>

    <!-- SEO & Accessibility: Hidden H1 -->
    <h1 style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0;">
        Universidad de Costa Rica - Sede de Guanacaste - Sistema Informativo
    </h1>

</body>
</html>
